name: On PR Merge — Notify Notion

on:
  pull_request:
    types: [closed]

jobs:
  notify-notion:
    if: github.event.pull_request.merged == true
    uses: FCP-Euro-Pricing-Team/.github/.github/workflows/notify-notion-pr-merged.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      repo_name: ${{ github.event.repository.name }}
    secrets:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_PR_TRACKER_DB_ID: ${{ secrets.NOTION_PR_TRACKER_DB_ID }}
