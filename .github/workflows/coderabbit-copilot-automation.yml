name: CodeRabbit → Copilot Automation Bridge
# CodeRabbit reviews → Creates consolidated GitHub issue → Assigns to Copilot → Copilot fixes autonomously

on:
  pull_request_review:
    types: [submitted]

  # Required for monitoring Copilot-assigned issues
  issues:
    types: [closed]

jobs:
  # Job 1: When CodeRabbit requests changes, trigger consolidated issue creation + Copilot assignment
  auto-delegate-to-copilot:
    name: Auto-delegate to Copilot
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'coderabbitai[bot]' &&
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger CodeRabbit to create consolidated issue and assign Copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repo = `${context.repo.owner}/${context.repo.repo}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `@coderabbitai Please create **ONE consolidated GitHub issue** for all findings in this PR:

            **Step 1: Create consolidated issue** (using MCP tool \`issue_write\`)
            - Title: \`[CodeRabbit Review] PR #${prNumber} - Consolidated Fixes\`
            - Body must include:
              - All findings grouped by file
              - Full code context and suggested fixes for each
              - Link back to PR #${prNumber}
              - Checklist of all items to fix
            - Labels: \`coderabbit-review\`, plus any relevant labels (\`bug\`, \`security\`, etc.)

            **Step 2: Assign to Copilot** (using MCP tool \`assign_copilot_to_issue\`)
            - Assign the consolidated issue to @copilot
            - Copilot will create a PR with \`Fixes #<issue>\` to resolve all items

            **Step 3: Request Copilot PR review** (using MCP tool \`request_copilot_review\`)
            - Request Copilot to also review PR #${prNumber} directly

            Create ONE issue with ALL findings, not separate issues per finding.
            Report back with the issue number when complete.`
            });

            console.log(`Triggered CodeRabbit automation for PR #${prNumber} in ${repo}`);

  # Job 2: When a Copilot-assigned issue is closed, notify the original PR
  monitor-copilot-progress:
    name: Monitor Copilot fixes
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      contains(github.event.issue.assignees.*.login, 'copilot')
    runs-on: ubuntu-latest

    steps:
      - name: Notify PR that Copilot completed fixes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;

            // Extract PR number from issue body (looks for PR #123 pattern)
            const prMatches = issue.body ? issue.body.match(/PR #(\d+)/) : null;
            if (!prMatches) {
              console.log(`No PR reference found in issue #${issue.number} body. Skipping.`);
              return;
            }

            const prNumber = parseInt(prMatches[1], 10);

            // Find Copilot's fix PR if one exists
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 10,
            });

            const copilotPR = pulls.data.find(pr =>
              pr.body && pr.body.includes(`#${issue.number}`) &&
              (pr.user.login === 'copilot[bot]' || pr.user.login === 'github-actions[bot]')
            );

            let message = `Copilot completed fixes for issue #${issue.number}.`;
            if (copilotPR) {
              message += `\n\nCopilot's fix PR: #${copilotPR.number}`;
            }
            message += `\n\nPlease re-review @coderabbitai`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message,
            });

            console.log(`Notified PR #${prNumber} about Copilot completing issue #${issue.number}`);

  # Job 3: When CodeRabbit approves, notify that the cycle is complete
  check-completion:
    name: Check if all fixes complete
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'coderabbitai[bot]' &&
      github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Notify completion
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '**All automated fixes complete!**',
                '',
                '- CodeRabbit review: Approved',
                '- Copilot issues: Resolved',
                '',
                'Ready for human review and merge.',
                '',
                `cc: @${prAuthor}`,
              ].join('\n'),
            });

            console.log(`PR #${prNumber} approved by CodeRabbit. Notified ${prAuthor}.`);
